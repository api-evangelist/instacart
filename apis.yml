aid: instacart
url: https://raw.githubusercontent.com/api-evangelist/instacart/refs/heads/main/apis.yml
modified: '2026-03-20'
apis:
  - aid: instacart:developer-platform-api
    name: Instacart Developer Platform API
    tags:
      - Grocery
      - Delivery
      - Shopping
      - Recipes
      - Products
      - E-Commerce
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://connect.instacart.com
    humanURL: https://docs.instacart.com/developer_platform_api/
    properties:
      - url: https://docs.instacart.com/developer_platform_api/
        type: Documentation
      - type: OpenAPI
        url: openapi/instacart-developer-platform-api-openapi.yml
    description: >-
      The Instacart Developer Platform API is a REST-based API that allows app
      developers to add Instacart shopping capabilities to their websites and
      applications. It provides endpoints for creating product shopping lists and
      recipe pages on Instacart Marketplace, enabling users to select a store, add
      ingredients or products to a cart, and check out. The API uses predictable
      resource-oriented URLs, standard HTTP methods, and API key authentication,
      with requests made to the connect.instacart.com base URL.
  - aid: instacart:connect-fulfillment-api
    name: Instacart Connect Fulfillment API
    tags:
      - Grocery
      - Delivery
      - Pickup
      - Fulfillment
      - Retail
      - E-Commerce
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://connect.instacart.com
    humanURL: https://docs.instacart.com/connect/fulfillment/
    properties:
      - url: https://docs.instacart.com/connect/fulfillment/
        type: Documentation
      - type: OpenAPI
        url: openapi/instacart-connect-fulfillment-api-openapi.yml
      - type: AsyncAPI
        url: asyncapi/instacart-connect-events-asyncapi.yml
    description: >-
      The Instacart Connect Fulfillment API enables retailers to integrate
      Instacart fulfillment capabilities directly into their e-commerce sites. It
      combines grocery, delivery, and pickup functionality into a single API,
      allowing retailers to offer full-service shopping where Instacart shoppers
      pick items and suggest replacements, as well as same-day or scheduled
      delivery and pickup options. Key endpoints include finding stores that offer
      delivery, listing available time slots, previewing service options, and
      creating delivery or pickup orders.
  - aid: instacart:connect-post-checkout-api
    name: Instacart Connect Post-Checkout API
    tags:
      - Orders
      - Tracking
      - Delivery
      - Retail
      - Fulfillment
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://connect.instacart.com
    humanURL: https://docs.instacart.com/connect/post-checkout/
    properties:
      - url: https://docs.instacart.com/connect/post-checkout/
        type: Documentation
      - type: OpenAPI
        url: openapi/instacart-connect-post-checkout-api-openapi.yml
    description: >-
      The Instacart Connect Post-Checkout API allows retailers to provide their
      customers with real-time order tracking and shopper interaction after an
      order has been placed. Retailers can use this API to build custom order
      status pages that display order details, live tracking information, and
      shopper communication. Customers can see updates while their order is being
      shopped and delivered, approve or decline item replacements suggested by
      shoppers, and communicate directly with shoppers via chat about
      replacements and additions.
  - aid: instacart:catalog-api
    name: Instacart Catalog API
    tags:
      - Catalog
      - Products
      - Inventory
      - Retail
      - E-Commerce
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://connect.instacart.com
    humanURL: https://docs.instacart.com/catalog/catalog_api/overview/
    properties:
      - url: https://docs.instacart.com/catalog/catalog_api/overview/
        type: Documentation
      - type: OpenAPI
        url: openapi/instacart-catalog-api-openapi.yml
    description: >-
      The Instacart Catalog API enables retailers to programmatically manage
      their product catalogs on the Instacart platform. Retailers can use the API
      to create or update products and items, with partial updates supported so
      that only the attributes included in the request body are modified. This
      API is designed for retailers who need to keep their Instacart product
      listings synchronized with their inventory management systems, ensuring
      accurate product information, pricing, and availability across the
      platform.
  - aid: instacart:shopping-widgets
    name: Instacart Shopping Widgets
    tags:
      - Widgets
      - Embedding
      - Shopping
      - Retail
      - Web Components
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://docs.instacart.com/widgets/
    properties:
      - url: https://docs.instacart.com/widgets/
        type: Documentation
    description: >-
      Instacart Shopping Widgets are front-end web components that retailers can
      embed into their websites to add e-commerce functionalities powered by
      Instacart without interacting with any API directly. The widgets enable
      features such as product search results, cart management, product
      collections, and user authentication. Retailers can use the Auth widget to
      allow customers to sign in or register, display cart item counts, and
      navigate customers to a storefront for checkout, providing a seamless
      shopping experience integrated into the retailer's own site.
common:
  - type: JSON-LD
    url: json-ld/instacart-context.jsonld
  - type: JSONSchema
    url: json-schema/instacart-order-schema.json
  - type: JSONSchema
    url: json-schema/instacart-product-schema.json
