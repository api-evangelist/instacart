naftiko: 1.0.0-alpha2
info:
  label: Instacart Connect Fulfillment API — Last Mile Delivery
  description: 'Instacart Connect Fulfillment API — Last Mile Delivery. 4 operations. Lead operation: Stage a last mile delivery
    order. Self-contained Naftiko capability covering one Instacart business surface.'
  tags:
  - Instacart
  - Last Mile Delivery
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INSTACART_API_KEY: INSTACART_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-fulfillment-last-mile-delivery
    baseUri: https://connect.instacart.com
    description: Instacart Connect Fulfillment API — Last Mile Delivery business capability. Self-contained, no shared references.
    resources:
    - name: v2-fulfillment-lastmile-orders-order_id-staged
      path: /v2/fulfillment/lastmile/orders/{order_id}/staged
      operations:
      - name: stagelastmileorder
        method: POST
        description: Stage a last mile delivery order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-fulfillment-lastmile-users-user_id-orders
      path: /v2/fulfillment/lastmile/users/{user_id}/orders
      operations:
      - name: createlastmileorder
        method: POST
        description: Create a last mile delivery order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-fulfillment-lastmile-users-user_id-service_options
      path: /v2/fulfillment/lastmile/users/{user_id}/service_options
      operations:
      - name: previewlastmileserviceoptions
        method: POST
        description: Reserve a time slot for last mile delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-fulfillment-stores-last_mile
      path: /v2/fulfillment/stores/last_mile
      operations:
      - name: findlastmilestores
        method: POST
        description: Find stores offering last mile delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.INSTACART_API_KEY}}'
  exposes:
  - type: rest
    namespace: connect-fulfillment-last-mile-delivery-rest
    port: 8080
    description: REST adapter for Instacart Connect Fulfillment API — Last Mile Delivery. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/fulfillment/lastmile/orders/{order-id}/staged
      name: v2-fulfillment-lastmile-orders-order-id-staged
      description: REST surface for v2-fulfillment-lastmile-orders-order_id-staged.
      operations:
      - method: POST
        name: stagelastmileorder
        description: Stage a last mile delivery order
        call: connect-fulfillment-last-mile-delivery.stagelastmileorder
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/fulfillment/lastmile/users/{user-id}/orders
      name: v2-fulfillment-lastmile-users-user-id-orders
      description: REST surface for v2-fulfillment-lastmile-users-user_id-orders.
      operations:
      - method: POST
        name: createlastmileorder
        description: Create a last mile delivery order
        call: connect-fulfillment-last-mile-delivery.createlastmileorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/fulfillment/lastmile/users/{user-id}/service-options
      name: v2-fulfillment-lastmile-users-user-id-service-options
      description: REST surface for v2-fulfillment-lastmile-users-user_id-service_options.
      operations:
      - method: POST
        name: previewlastmileserviceoptions
        description: Reserve a time slot for last mile delivery
        call: connect-fulfillment-last-mile-delivery.previewlastmileserviceoptions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/fulfillment/stores/last-mile
      name: v2-fulfillment-stores-last-mile
      description: REST surface for v2-fulfillment-stores-last_mile.
      operations:
      - method: POST
        name: findlastmilestores
        description: Find stores offering last mile delivery
        call: connect-fulfillment-last-mile-delivery.findlastmilestores
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-fulfillment-last-mile-delivery-mcp
    port: 9090
    transport: http
    description: MCP adapter for Instacart Connect Fulfillment API — Last Mile Delivery. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: stage-last-mile-delivery-order
      description: Stage a last mile delivery order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connect-fulfillment-last-mile-delivery.stagelastmileorder
      outputParameters:
      - type: object
        mapping: $.
    - name: create-last-mile-delivery-order
      description: Create a last mile delivery order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connect-fulfillment-last-mile-delivery.createlastmileorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: reserve-time-slot-last-mile
      description: Reserve a time slot for last mile delivery
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connect-fulfillment-last-mile-delivery.previewlastmileserviceoptions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: find-stores-offering-last-mile
      description: Find stores offering last mile delivery
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: connect-fulfillment-last-mile-delivery.findlastmilestores
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
