specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Instacart
providerId: instacart
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Grocery
  - E-Commerce
  - Marketplace
  - Logistics
  - Same-Day Delivery
description: Instacart's Connect / Developer Platform APIs are offered to retail and brand partners under
  a partner agreement rather than as a self-serve developer product. Access is OAuth 2.0 and granted
  upon enrollment, with one development and one production environment per partner. Public per-call
  pricing is not published; the underlying business is the marketplace take rate on grocery orders, retail
  technology subscriptions for the Instacart-Powered storefronts, and ads.
notes: No public per-API price list. Marketplace economics (delivery, service, and merchant take rates)
  are the dominant cost levers; reconcile against the partner agreement.
sources:
  - https://docs.instacart.com/connect/api
  - https://docs.instacart.com/
plans:
  - id: instacart-partner
    name: Instacart Connect Partner
    type: enterprise
    description: Partner-only API access for retailers and CPG brands. Access granted via Instacart enrollment;
      OAuth 2.0 over HTTPS; both a development and production environment provisioned. APIs are bundled
      into the partner agreement.
    entries:
      - label: Partner program access
        description: API access bundled into the Instacart partner agreement; not separately metered
        name: partner_access
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: US/CA
        domains:
          - https://{instacart_domain}/v2
        unit: 1
        price: contact partner team
        userMultiplied: false
    elements:
      - name: Instacart Connect API
      - name: OAuth 2.0
      - name: Development + production environments
      - name: 6-month deprecation notice for retired fields
      - name: Backward-compatible additions
  - id: instacart-marketplace
    name: Marketplace Take Rate (retailer billing)
    type: usage-based
    description: Retailers and brands pay Instacart take rates on completed orders rather than per API
      call. Specific rates are negotiated per retailer.
    entries:
      - label: Per-order take rate
        description: Negotiated take rate on completed marketplace orders
        name: take_rate
        type: metered
        metric: order
        limit: -1
        timeFrame: usage
        geo: US/CA
        domains:
          - https://{instacart_domain}/v2
        unit: 1
        price: see partner agreement
        userMultiplied: false
    elements:
      - name: Marketplace fulfillment
      - name: Shopper network
      - name: Storefront / Powered-by Instacart
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
