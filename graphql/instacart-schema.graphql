type Mutation {
  addItemToCart(cartId: ID!, itemId: ID!, quantity: Decimal!, storeId: ID!): CartItem!
  updateCartItem(cartItemId: ID!, quantity: Decimal!): CartItem!
  removeCartItem(cartItemId: ID!): Boolean!
  applyCoupon(cartId: ID!, couponCode: String!): Cart!
  removeCoupon(cartId: ID!, couponCode: String!): Cart!
  checkout(cartId: ID!, paymentMethodId: ID!, tip: Decimal): Checkout!
  cancelOrder(orderId: ID!, reason: String): Order!
  approveSubstitution(substitutionId: ID!): Substitution!
  rejectSubstitution(substitutionId: ID!): Substitution!
  createShoppingList(customerId: ID!, name: String!): ShoppingList!
  addListItem(listId: ID!, name: String!, quantity: Decimal, unit: String): ListItem!
  removeListItem(listItemId: ID!): Boolean!
  createWebhook(url: URL!, events: [WebhookEventType!]!): Webhook!
  deleteWebhook(webhookId: ID!): Boolean!
  rateOrder(orderId: ID!, score: Int!): Rating!
  reviewProduct(productId: ID!, rating: Int!, title: String, body: String): Review!
  addPaymentMethod(customerId: ID!, type: PaymentMethodType!, token: String!): PaymentMethod!
