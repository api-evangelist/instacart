specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Instacart
providerId: instacart
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Grocery
  - E-Commerce
  - Marketplace
  - Rate Limiting
description: Instacart Connect APIs are throttled per-second. Exceeding the per-second threshold returns
  HTTP 429 ("Too many requests"). Specific per-second numbers are not published in the public Connect
  documentation; partners with persistent 429s are directed to contact their Instacart representative.
  All requests must use HTTPS; HTTP requests are rejected.
notes: Per-second TPS ceiling exists but is not numerically published; documented as 'per-second threshold'
  rather than fabricated.
sources:
  - https://docs.instacart.com/connect/api
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-second request threshold
    scope: partner
    metric: requests_per_second
    limit: per-second threshold (exact value not publicly published)
    applies:
      - Instacart Connect API
policies:
  - name: HTTPS Required
    description: All requests must use HTTPS; HTTP requests are rejected.
  - name: Backoff Strategy
    description: On HTTP 429, clients should back off and retry with exponential backoff and jitter; persistent
      throttling should be raised with the Instacart partner representative.
  - name: Backward Compatibility
    description: New fields are additive and optional; deprecated fields remain functional for at least
      six months with advance notice in the changelog.
  - name: Encoding and Types
    description: Strings are UTF-8 without enforced length limits; integers default to int64.
  - name: Fair Use
    description: Throttling is designed to allow legitimate traffic while preventing denial-of-service.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
